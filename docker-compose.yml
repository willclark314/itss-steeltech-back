services:
  backend:
    build:
      context: .
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
    container_name: itss-steeltech-back
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      DATABASE_BACKEND: ${DATABASE_BACKEND:-sqlite}
      SQLITE_DATABASE_PATH: /app/datas/steeltech.db
      DEFAULT_LOGIN_PASSWORD: ${DEFAULT_LOGIN_PASSWORD:-123456}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-steeltech}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-itss_steeltech}
    volumes:
      - backend-instance:/app/instance
    depends_on:
      mysql:
        condition: service_healthy
        required: false
    restart: unless-stopped

  mysql:
    profiles:
      - mysql
    image: mysql:8.0
    container_name: itss-steeltech-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-steeltech}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-itss_steeltech}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

volumes:
  backend-instance:
  mysql-data:
